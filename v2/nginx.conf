server {
    listen       80;
    listen       [::]:80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    gzip            on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # Never cache the runtime configuration / game data, so a mounted or entrypoint-injected
    # override (e.g. a new calcUrl or dataset) takes effect on the next page load without a rebuild.
    location ~* /assets/(config|data|dataGridExample)\.json$ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Content-hashed build assets are immutable — cache them aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files  $uri =404;
    }

    # Images and GeoTIFF game data: cacheable but allowed to revalidate.
    location ~* \.(?:png|jpe?g|gif|ico|svg|tif|tiff)$ {
        expires   1h;
        try_files $uri =404;
    }

    # SPA fallback. Harmless with the app's hash routing; future-proofs a switch to path routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
