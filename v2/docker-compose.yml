# Base / 'esgame' stack: just the frontend serving the client-side grid game (Configuration 2),
# i.e. exactly what https://<owner>.github.io/esgame/ hosts. No backend (calcUrl stays "").
#
# The 'esgame-dynamic' stack layers docker-compose.dynamic.yml on top to add the R calculator
# and GeoServer that the dynamic game (and places) needs. Driven by the repo-root Makefile.
name: esgame

services:
  esgame-core:
    build:
      context: .
    image: local/esgame-core
    ports:
      - "81:80"
    # No CALC_URL set -> the image keeps its built-in assets/config.json (calcUrl ""),
    # i.e. the fully client-side grid game. The dynamic overlay sets CALC_URL.
    # url: http://localhost:81/
