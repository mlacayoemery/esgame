name: Build & publish container image

# Publishes the esgame frontend image to GitHub Container Registry so downstream
# deployments (e.g. places) consume the SAME image instead of vendoring the source.
# Image: ghcr.io/<owner>/esgame  (tagged with branch, semver, and commit sha)

on:
  push:
    branches: [master]
    tags: ['v*']
    paths:
      - 'v2/**'
      - '.github/workflows/image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - uses: docker/build-push-action@v5
        with:
          context: v2
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
