name: Deploy v2 to GitHub Pages

# Publishes the Angular v2 app (in /v2) to GitHub Pages at https://<owner>.github.io/esgame/.
# The legacy vanilla-JS v1 game is archived alongside it at /esgame/v1/.

on:
  push:
    branches: [master]
    paths:
      - 'v2/**'
      - 'docs/**'
      - '.github/workflows/deploy.yml'
      # legacy v1 assets, so re-archived if they ever change
      - 'index.html'
      - 'calc.html'
      - 'wc.htm'
      - 'calc_files/**'
      - 'images/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Angular 22 requires Node ^22.22.3 || ^24.15.0 || >=26.
          node-version: 22.22.3
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        working-directory: v2
        run: npm ci

      - name: Build (served from /esgame/)
        working-directory: v2
        run: npm run build -- --base-href /esgame/ --configuration production

      - name: Archive legacy v1 under /v1/
        run: |
          dist=v2/dist/tradeoff-v2
          mkdir -p "$dist/v1"
          cp -r index.html calc.html wc.htm calc_files images "$dist/v1/"

      # Note: 404.html (the spa-github-pages redirect for clean URLs) is built from src/404.html
      # via the angular.json assets list, so no SPA-fallback copy step is needed here.

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Sphinx docs (served from /esgame/docs/)
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          # Sphinx emits relative URLs, so the docs work unchanged under the /esgame/docs/ sub-path.
          sphinx-build -b html docs v2/dist/tradeoff-v2/docs
          # The Pages artifact is served without Jekyll, but be explicit so Sphinx's
          # _static / _sources directories are never skipped.
          touch v2/dist/tradeoff-v2/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: v2/dist/tradeoff-v2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
