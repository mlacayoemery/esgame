name: Deploy v2 to GitHub Pages

# Publishes the Angular v2 app (in /v2) to GitHub Pages at https://<owner>.github.io/esgame/.
# The legacy vanilla-JS v1 game is archived alongside it at /esgame/v1/.

on:
  push:
    branches: [master]
    paths:
      - 'v2/**'
      - '.github/workflows/deploy.yml'
      # legacy v1 assets, so re-archived if they ever change
      - 'index.html'
      - 'calc.html'
      - 'wc.htm'
      - 'calc_files/**'
      - 'images/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        working-directory: v2
        run: npm ci

      - name: Build (served from /esgame/)
        working-directory: v2
        run: npm run build -- --base-href /esgame/ --configuration production

      - name: Archive legacy v1 under /v1/
        run: |
          dist=v2/dist/tradeoff-v2
          mkdir -p "$dist/v1"
          cp -r index.html calc.html wc.htm calc_files images "$dist/v1/"

      - name: SPA fallback (serve index.html for unknown paths)
        run: cp v2/dist/tradeoff-v2/index.html v2/dist/tradeoff-v2/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: v2/dist/tradeoff-v2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
